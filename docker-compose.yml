services:
  backend:
    build:
      context: ./backend
    image: guessthebest-backend
    restart: unless-stopped
    expose:
      - "8080"
    volumes:
      - quizdata:/data
    healthcheck:
      test: ["CMD", "bash", "-c", "echo > /dev/tcp/127.0.0.1/8080"]
      interval: 10s
      timeout: 3s
      retries: 12
      start_period: 25s

  frontend:
    build:
      context: ./frontend
    image: guessthebest-frontend
    restart: unless-stopped
    ports:
      - "8080:80"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  quizdata:
